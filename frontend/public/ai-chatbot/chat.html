<!DOCTYPE html>
<html lang="en">
<head>

  <title>Chat - AI Chatbot</title>

</head>

    <h1>Chat with AI</h1>

    <a href="index.html" class="back-link">← Back</a>

  <script src="script.js"></script>

</html>
